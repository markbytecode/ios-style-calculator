<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Mark" />
    <meta name="description" content="template" />
    <meta name="keywords" content="template" />
    <!-- ------------------------------------------------- title -->
    <title>iOS-style Calculator_JS</title>
    <!-- ------------------------------------------------- CSS -->
    <link rel="stylesheet" href="style.css" />
    <!-- ------------------------------------------------- JavaScript -->
    <script defer src="script.js"></script>
  </head>

  <!-- ------------------------------------------------- body -->
  <body>
    <div class="calculator">
      <!-- Calculator display -->
      <div class="display">
        <div class="previous-operand" data-previous></div>
        <div class="current-operand" data-current>0</div>
      </div>

      <!-- Calculator buttons -->
      <div class="buttons" data-buttons>
        <button class="btn" data-action="clear">AC</button>
        <button class="btn" data-action="toggle-sign">
          <svg
            class="toggle-sign-icon"
            fill="currentColor"
            viewBox="0 0 16 16"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="m1.854 14.854 13-13a.5.5 0 0 0-.708-.708l-13 13a.5.5 0 0 0 .708.708M4 1a.5.5 0 0 1 .5.5v2h2a.5.5 0 0 1 0 1h-2v2a.5.5 0 0 1-1 0v-2h-2a.5.5 0 0 1 0-1h2v-2A.5.5 0 0 1 4 1m5 11a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5A.5.5 0 0 1 9 12"
            />
          </svg>
        </button>
        <button class="btn" data-action="percent">
          <svg
            class="percent-icon"
            fill="currentColor"
            viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M20.7071 3.29289C21.0976 3.68342 21.0976 4.31658 20.7071 4.70711L4.70711 20.7071C4.31658 21.0976 3.68342 21.0976 3.29289 20.7071C2.90237 20.3166 2.90237 19.6834 3.29289 19.2929L19.2929 3.29289C19.6834 2.90237 20.3166 2.90237 20.7071 3.29289Z"
              fill="currentColor"
            ></path>
            <path
              fill-rule="evenodd"
              clip-rule="evenodd"
              d="M4 6.5C4 4.567 5.567 3 7.5 3C9.433 3 11 4.567 11 6.5C11 8.433 9.433 10 7.5 10C5.567 10 4 8.433 4 6.5ZM7.5 5C6.67157 5 6 5.67157 6 6.5C6 7.32843 6.67157 8 7.5 8C8.32843 8 9 7.32843 9 6.5C9 5.67157 8.32843 5 7.5 5Z"
              fill="currentColor "
            ></path>
            <path
              fill-rule="evenodd"
              clip-rule="evenodd"
              d="M16.5 14C14.567 14 13 15.567 13 17.5C13 19.433 14.567 21 16.5 21C18.433 21 20 19.433 20 17.5C20 15.567 18.433 14 16.5 14ZM15 17.5C15 16.6716 15.6716 16 16.5 16C17.3284 16 18 16.6716 18 17.5C18 18.3284 17.3284 19 16.5 19C15.6716 19 15 18.3284 15 17.5Z"
              fill="currentColor"
            ></path>
          </svg>
        </button>
        <button class="btn" data-operator="/">
          <svg
            class="divide-icon"
            fill="currentColor"
            viewBox="0 0 256 256"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M228,128a12,12,0,0,1-12,12H40a12,12,0,0,1,0-24H216A12,12,0,0,1,228,128ZM128,84a20,20,0,1,0-20-20A20.0226,20.0226,0,0,0,128,84Zm0,88a20,20,0,1,0,20,20A20.0226,20.0226,0,0,0,128,172Z"
            ></path>
          </svg>
        </button>

        <button class="btn" data-number="7">7</button>
        <button class="btn" data-number="8">8</button>
        <button class="btn" data-number="9">9</button>

        <button class="btn" data-operator="*">
          <svg
            class="multiply-icon"
            fill="currentColor"
            viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M12 13.4142L16.9497 18.364L18.364 16.9498L13.4142 12L18.364 7.05026L16.9497 5.63605L12 10.5858L7.05025 5.63605L5.63604 7.05026L10.5858 12L5.63604 16.9498L7.05025 18.364L12 13.4142Z"
              fill="currentColor"
            />
          </svg>
        </button>

        <button class="btn" data-number="4">4</button>
        <button class="btn" data-number="5">5</button>
        <button class="btn" data-number="6">6</button>
        <button class="btn" data-operator="-">
          <svg
            class="minus-icon"
            fill="currentColor"
            viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path d="M19 13H5a1 1 0 0 1 0-2h14a1 1 0 0 1 0 2z"></path>
          </svg>
        </button>

        <button class="btn" data-number="1">1</button>
        <button class="btn" data-number="2">2</button>
        <button class="btn" data-number="3">3</button>

        <button class="btn" data-operator="+">
          <svg
            class="plus-icon"
            fill="currentColor"
            viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M19 11h-6V5a1 1 0 0 0-2 0v6H5a1 1 0 0 0 0 2h6v6a1 1 0 0 0 2 0v-6h6a1 1 0 0 0 0-2z"
            ></path>
          </svg>
        </button>

        <button class="btn zero" data-number="0">0</button>
        <button class="btn" data-number=".">.</button>

        <button class="btn" data-action="equals">
          <svg
            class="equals-icon"
            viewBox="0 0 24 24"
            fill="currentColor"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path d="m5 9 14 0" stroke-width="2"></path>
            <path d="m5 15 14 0" stroke-width="2"></path>
          </svg>
        </button>
      </div>
    </div>
  </body>
</html>
